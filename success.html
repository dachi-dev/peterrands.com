<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Complete - Pet Errands</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#1a5c30">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f0faf3;
      color: #333;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    .icon { font-size: 4rem; margin-bottom: 16px; }
    h1 { font-size: 1.8rem; color: #1a5c30; margin-bottom: 12px; }
    p { color: #666; margin-bottom: 24px; line-height: 1.6; }
    a {
      display: inline-block;
      background: #2d7d46;
      color: white;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 600;
    }
    a:hover { background: #1a5c30; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>You're All Set!</h1>
    <p>Thanks for signing up with Pet Errands Poop Patrol. We'll be in touch shortly to schedule your first visit.</p>
    <a href="/">Back to Home</a>
  </div>

  <script>
    // Send payment completion to Google Sheets
    const customer = JSON.parse(localStorage.getItem('petErrands_customer') || 'null');
    if (customer && customer.email) {
      const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzAyTkHdbOTLzHNolYczUKJN7xbX98T4LYw47oabNoLEiz27-55rjRHT4nb4weBVM-y/exec';
      const iframe = document.createElement('iframe');
      iframe.name = 'sheets-update';
      iframe.style.display = 'none';
      document.body.appendChild(iframe);

      const form = document.createElement('form');
      form.method = 'POST';
      form.action = SHEETS_URL;
      form.target = 'sheets-update';

      const fields = {
        action: 'updateStatus',
        email: customer.email,
        paymentStatus: 'Completed'
      };
      Object.entries(fields).forEach(([key, val]) => {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = key;
        input.value = val;
        form.appendChild(input);
      });
      document.body.appendChild(form);
      form.submit();
    }
  </script>
</body>
</html>
