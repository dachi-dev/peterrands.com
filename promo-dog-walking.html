<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dog Walking - Pet Errands Promo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

  html, body { margin: 0; padding: 0; background: #2a2a2a; font-family: 'Inter', sans-serif; }

  .poster {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(160deg, #1a5c30 0%, #2d7d46 60%, #4ba866 100%);
    color: #fff;
    margin: 0 auto;
  }

  /* Top dog photo */
  .photo {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 460px;
    background-image: url('https://images.unsplash.com/photo-1507146426996-ef05306b995a?w=1200&q=80');
    background-size: cover;
    background-position: center 40%;
  }
  .photo::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 50%, #1a5c30 100%);
  }

  /* Burst badge */
  .badge {
    position: absolute;
    top: 60px;
    right: 60px;
    width: 240px;
    height: 240px;
    background: #fef3c7;
    color: #92400e;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    transform: rotate(-12deg);
    border: 6px solid #fff;
    text-align: center;
    line-height: 1;
  }
  .badge .from { font-size: 26px; font-weight: 800; letter-spacing: 1px; margin-bottom: 4px; }
  .badge .pct { font-size: 80px; font-weight: 900; letter-spacing: -3px; }
  .badge .off { font-size: 24px; font-weight: 800; margin-top: 6px; letter-spacing: 2px; }

  /* Content */
  .content {
    position: absolute;
    left: 0;
    right: 0;
    top: 420px;
    bottom: 0;
    padding: 40px 70px 50px;
    text-align: center;
    display: flex;
    flex-direction: column;
  }
  .eyebrow {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #fef3c7;
    margin-bottom: 14px;
  }
  h1 {
    font-size: 82px;
    font-weight: 900;
    line-height: 0.95;
    margin: 0 0 12px;
    letter-spacing: -2px;
    text-shadow: 0 4px 20px rgba(0,0,0,0.35);
  }
  h1 span { color: #ffd84d; }
  .sub {
    font-size: 26px;
    font-weight: 500;
    opacity: 0.95;
    margin-bottom: 28px;
    line-height: 1.3;
  }

  /* Pricing grid */
  .tiers {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 32px;
  }
  .tier {
    background: rgba(255,255,255,0.13);
    border: 2px solid rgba(255,216,77,0.5);
    border-radius: 16px;
    padding: 16px 8px 18px;
    backdrop-filter: blur(4px);
  }
  .tier.popular {
    background: #ffd84d;
    color: #1a5c30;
    border-color: #fff;
    transform: scale(1.05);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .tier .name {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .tier .price {
    font-size: 38px;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 4px;
    letter-spacing: -1px;
  }
  .tier .each {
    font-size: 14px;
    font-weight: 600;
    opacity: 0.85;
    letter-spacing: 0.3px;
  }
  .tier.popular .each { opacity: 1; }

  .cta {
    display: inline-block;
    align-self: center;
    background: #ffd84d;
    color: #1a5c30;
    font-size: 28px;
    font-weight: 900;
    padding: 18px 48px;
    border-radius: 999px;
    letter-spacing: 0.5px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  .footer {
    margin-top: 16px;
    font-size: 18px;
    font-weight: 600;
    opacity: 0.9;
    letter-spacing: 0.5px;
  }
  .footer strong { color: #ffd84d; }
</style>
</head>
<body>
  <div class="poster">
    <div class="photo"></div>

    <div class="badge">
      <div class="from">FROM</div>
      <div class="pct">$79</div>
      <div class="off">/MO</div>
    </div>

    <div class="content">
      <div class="eyebrow">Houston &amp; Surrounding Areas</div>
      <h1>Dog Walking<br><span>Monthly Plans</span></h1>
      <div class="sub">Pick your frequency &middot; Auto-renews &middot; Cancel anytime</div>

      <div class="tiers">
        <div class="tier">
          <div class="name">Lite</div>
          <div class="price">$79</div>
          <div class="each">1 walk / wk</div>
        </div>
        <div class="tier">
          <div class="name">Basic</div>
          <div class="price">$149</div>
          <div class="each">2 walks / wk</div>
        </div>
        <div class="tier popular">
          <div class="name">Standard</div>
          <div class="price">$209</div>
          <div class="each">3 walks / wk</div>
        </div>
        <div class="tier">
          <div class="name">Premium</div>
          <div class="price">$329</div>
          <div class="each">5 walks / wk</div>
        </div>
      </div>

      <div class="cta">Book at PetErrands.com</div>
      <div class="footer">30-min walks &middot; Up to 2 dogs &middot; Photo after every visit</div>
    </div>
  </div>
</body>
</html>
