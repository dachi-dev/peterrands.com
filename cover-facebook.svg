<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 624" width="1640" height="624">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d7d46"/>
      <stop offset="100%" stop-color="#1a5c30"/>
    </linearGradient>
    <symbol id="paw" viewBox="-300 -300 600 600">
      <ellipse cx="0" cy="120" rx="220" ry="200"/>
      <ellipse cx="-220" cy="-130" rx="100" ry="125"/>
      <ellipse cx="0" cy="-200" rx="105" ry="130"/>
      <ellipse cx="220" cy="-130" rx="100" ry="125"/>
    </symbol>
  </defs>

  <rect width="1640" height="624" fill="url(#bg)"/>

  <!-- Decorative faded paws -->
  <g fill="#ffffff" opacity="0.07">
    <use href="#paw" x="120" y="120" width="180" height="180"/>
    <use href="#paw" x="100" y="440" width="140" height="140" transform="rotate(-15 170 510)"/>
    <use href="#paw" x="1380" y="100" width="160" height="160" transform="rotate(20 1460 180)"/>
    <use href="#paw" x="1420" y="430" width="200" height="200" transform="rotate(-10 1520 530)"/>
    <use href="#paw" x="320" y="20" width="110" height="110" transform="rotate(25 375 75)"/>
    <use href="#paw" x="1230" y="500" width="120" height="120" transform="rotate(-25 1290 560)"/>
  </g>

  <!-- Centered content (kept inside mobile-safe zone ~ center 640px wide) -->
  <g transform="translate(820 312)">
    <!-- Paw icon above text -->
    <g transform="translate(-320 -40)">
      <use href="#paw" x="-110" y="-110" width="220" height="220" fill="#ffffff"/>
    </g>

    <!-- Wordmark -->
    <text x="-180" y="-30"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="110"
          font-weight="800"
          fill="#ffffff"
          letter-spacing="-2">
      Pet Errands
    </text>

    <!-- Tagline -->
    <text x="-180" y="40"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="44"
          font-weight="500"
          fill="#ffffff"
          opacity="0.95">
      Pet errands, handled.
    </text>

    <!-- Service list -->
    <text x="-180" y="115"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="30"
          font-weight="400"
          fill="#ffffff"
          opacity="0.85">
      Waste pickup · Pet taxi · Dog walking · Manvel, TX
    </text>

    <!-- URL pill -->
    <g transform="translate(-180 155)">
      <rect x="0" y="0" rx="26" ry="26" width="380" height="52" fill="#ffffff"/>
      <text x="190" y="35"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="28"
            font-weight="700"
            fill="#1a5c30"
            text-anchor="middle">
        peterrands.com
      </text>
    </g>
  </g>
</svg>
