<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>All Services - Pet Errands Promo (Square)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

  html, body { margin: 0; padding: 0; background: #2a2a2a; font-family: 'Inter', sans-serif; }

  .poster {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(160deg, #1a5c30 0%, #2d7d46 55%, #4ba866 100%);
    color: #fff;
    margin: 0 auto;
  }

  /* Decorative paw prints */
  .paw {
    position: absolute;
    opacity: 0.07;
    font-size: 220px;
    pointer-events: none;
  }
  .paw.p1 { top: -30px; left: -30px; transform: rotate(-18deg); }
  .paw.p2 { bottom: -40px; right: -40px; transform: rotate(20deg); }

  /* Header */
  .header {
    text-align: center;
    padding: 70px 60px 30px;
    position: relative;
  }
  .eyebrow {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #ffd84d;
    margin-bottom: 18px;
  }
  h1 {
    font-size: 80px;
    font-weight: 900;
    line-height: 0.95;
    margin: 0 0 18px;
    letter-spacing: -2px;
    text-shadow: 0 4px 20px rgba(0,0,0,0.35);
  }
  h1 span { color: #ffd84d; display: block; }
  .sub {
    font-size: 26px;
    font-weight: 500;
    opacity: 0.95;
    line-height: 1.35;
    max-width: 820px;
    margin: 0 auto;
  }

  /* Services grid */
  .services {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 22px;
    padding: 40px 70px 30px;
    position: relative;
    z-index: 2;
  }

  .service {
    background: rgba(255,255,255,0.13);
    border: 2px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(2px);
    border-radius: 22px;
    padding: 26px 18px 22px;
    text-align: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.18);
  }
  .service .emoji {
    font-size: 70px;
    line-height: 1;
    margin-bottom: 10px;
  }
  .service h3 {
    font-size: 26px;
    font-weight: 800;
    margin: 0;
    letter-spacing: -0.3px;
  }

  /* Footer CTA */
  .footer-cta {
    position: absolute;
    bottom: 50px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 2;
  }
  .cta {
    display: inline-block;
    background: #ffd84d;
    color: #1a5c30;
    font-size: 32px;
    font-weight: 900;
    padding: 22px 60px;
    border-radius: 999px;
    letter-spacing: 0.5px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.35);
  }
  .tag {
    margin-top: 22px;
    font-size: 22px;
    font-weight: 600;
    opacity: 0.95;
    letter-spacing: 1px;
  }
  .tag strong { color: #ffd84d; }
</style>
</head>
<body>
  <div class="poster">
    <div class="paw p1">🐾</div>
    <div class="paw p2">🐾</div>

    <div class="header">
      <div class="eyebrow">Houston &amp; Surrounding Areas</div>
      <h1>Pet Errands<span>Handled.</span></h1>
      <div class="sub">From poop patrol to pet taxi — we take care of the chores so you can enjoy the cuddles.</div>
    </div>

    <div class="services">
      <div class="service">
        <div class="emoji">💩</div>
        <h3>Waste Pickup</h3>
      </div>
      <div class="service">
        <div class="emoji">🐕</div>
        <h3>Dog Walking</h3>
      </div>
      <div class="service">
        <div class="emoji">🐾</div>
        <h3>Pet Visits</h3>
      </div>
      <div class="service">
        <div class="emoji">🚗</div>
        <h3>Pet Taxi</h3>
      </div>
      <div class="service">
        <div class="emoji">🛁</div>
        <h3>Grooming Runs</h3>
      </div>
      <div class="service">
        <div class="emoji">🦴</div>
        <h3>Supply Drops</h3>
      </div>
    </div>

    <div class="footer-cta">
      <div class="cta">PetErrands.com</div>
      <div class="tag">Locally owned &middot; <strong>Family run</strong> &middot; Pet parents</div>
    </div>
  </div>
</body>
</html>
