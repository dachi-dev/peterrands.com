<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <!-- Background circle (Facebook crops profile pics to circle) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d7d46"/>
      <stop offset="100%" stop-color="#1a5c30"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Paw print, centered, white -->
  <g transform="translate(540 560)" fill="#ffffff">
    <!-- Paw pad -->
    <ellipse cx="0" cy="120" rx="220" ry="200"/>
    <!-- Toes -->
    <ellipse cx="-220" cy="-130" rx="100" ry="125"/>
    <ellipse cx="0" cy="-200" rx="105" ry="130"/>
    <ellipse cx="220" cy="-130" rx="100" ry="125"/>
  </g>
</svg>
